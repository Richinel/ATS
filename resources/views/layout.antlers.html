<!doctype html>
<html lang="{{ site:short_locale }}">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ title ?? site:name }}</title>
        {{ vite src="resources/js/site.js" }}
    </head>

                    <div class="d-flex flex-wrap">

                            <ul class="d-flex list-style-none flex-wrap">
                                <li class="d-flex align-items-center">
                                    <a href="#!" class="h2">
                                        Kunststof rijplaten
                                    </a>
                                </li>

                                <li class="d-flex align-items-center">
                                    <a href="#!" class="h2">
                                        Stalen rijplaten
                                    </a>
                                </li>

                                <li class="d-flex align-items-center">
                                    <a href="#!" class="h2">
                                        Stempelplaten
                                    </a>
                                </li>
                            </ul>
                        </nav>

                            <span class="color--green-100 font--alternative">(0)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-bottom bg--grey-200-grey-100 color--white py-xs-15">
            <div class="wrapper wrapper--xl">
                <div class="header-bottom__inner d-flex align-items-center justify-content-between">
                    <nav class="header-bottom__nav-left">
                        <ul class="d-flex align-items-center list-style-none">
                            {{ nav:main_navigation }}
                                <li class="d-flex align-items-center">
                                    <a href="{{ $url }}" class="h3 color--white text--uppercase">
                                        {{ $title }}
                                    </a>
                                </li>
                            {{ /nav:main_navigation }}
                        </ul>
                    </nav>

                    <div class="header-bottom__nav-right d-flex">
                        <ul class="d-flex align-items-center list-style-none header__cta-buttons">
                            {{ nav:header_ctas }}
                                <li class="d-flex align-items-center">
                                    <a href="{{ $url }}" class="h3 text--uppercase btn">
                                        {{ $title }}
                                    </a>
                                </li>
                            {{ /nav:header_ctas }}
                        </ul>

                        <div class="header__language list-style-none">

                            <div class="header__language-selected js-lang-select bg--white d-flex align-items-center">
                                <a href="/" class="js-lang-item" data-language="nl">
                                    <img src="/assets/img/nl.webp" alt="NL">
                                </a>

                                <a href="/" class="js-lang-item" data-language="en">
                                    <img src="/assets/img/en.webp" alt="EN">
                                </a>

                                <a href="/" class="js-lang-item" data-language="de">
                                    <img src="/assets/img/de.webp" alt="DE">
                                </a>

                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M300.3 440.8C312.9 451 331.4 450.3 343.1 438.6L471.1 310.6C480.3 301.4 483 287.7 478 275.7C473 263.7 461.4 256 448.5 256L192.5 256C179.6 256 167.9 263.8 162.9 275.8C157.9 287.8 160.7 301.5 169.9 310.6L297.9 438.6L300.3 440.8z"/></svg>
                            </div>

                            <ul class="list-style-none js-lang-dropdown">
                                <li class="bg--white js-lang-item" data-language="nl">
                                    <a href="/">
                                        <img src="/assets/img/nl.webp" alt="NL">
                                    </a>
                                </li>

                                <li class="bg--white js-lang-item" data-language="en">
                                    <a href="/">
                                        <img src="/assets/img/en.webp" alt="EN">
                                    </a>
                                </li>

                                <li class="bg--white js-lang-item" data-language="de">
                                    <a href="/">
                                        <img src="/assets/img/de.webp" alt="DE">
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </header>

    <body class="">
        {{ template_content }}
    </body>
</html>
