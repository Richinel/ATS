<section class="cta">
    <div class="cta__inner bg--green-100 color--white py-xs-20">
        <div class="wrapper">
            <div class="row align-items-center">
                <div class="col-lg-9">
                    <div class="cms-output color--white">
                        <h2 class="color--white text--uppercase">
                            {{ cta_titel }}
                        </h2>
                    </div>

                    <div class="cms-output mt-md-10 mt-xs-30 color--white">
                        {{ cta_content }}
                    </div>

                    <div class="mt-xs-30">
                        <a href="{{ cta_link }}" class="btn bg--grey-100 bg--pattern">
                            {{ cta_link_tag }}

                            <span>
                                >
                            </span>
                        </a>
                    </div>
                </div>

                <div class="col-lg-3 d-lg-block d-none">
                    <div class="d-flex align-items-center justify-content-end">
                        <img src="/assets/img/ats-green.webp" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
