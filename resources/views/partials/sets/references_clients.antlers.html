<section class="references-clients">
    <div class="wrapper">
        <div class="row align-items-center justify-content-between">
            <div class="col-lg-8">
                <div class="references-clients__references">
                    <h2 class="text--uppercase">
                        {{ titel_referenties }}
                    </h2>

                    <div class="references-clients__slider mt-md-50 mt-xs-30 js-reference-slider">
                        {{ collection from='references' }}
                            <div class="item">
                                <div class="reference-item">
                                    <div class="row align-items-center justify-content-between">
                                        <div class="col-md-3">
                                            <img src="{{ logo }}" alt="{{ logo:alt }}">
                                        </div>

                                        <div class="col-md-8 mt-md-0 mt-xs-10">
                                            <div class="reference-item__content">
                                                <div class="reference-item__rating d-flex mb-xs-10 justify-content-md-start justify-content-center">
                                                    {{ loop :times="rating" }}
                                                        <svg class="star-full" style="fill: currentColor;overflow: hidden;" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"><path d="M987.282286 369.737143q0 12.580571-14.848 27.428571l-207.433143 202.313143 49.152 285.696q0.585143 4.022857 0.585143 11.410286 0 11.995429-5.997714 20.260571t-17.408 8.265143q-10.825143 0-22.820571-6.875429l-256.585143-134.875429-256.585143 134.875429q-12.580571 6.875429-22.820571 6.875429-11.995429 0-17.993143-8.265143t-5.997714-20.260571q0-3.437714 1.170286-11.410286l49.152-285.696-208.018286-202.313143q-14.262857-15.433143-14.262857-27.428571 0-21.138286 32.036571-26.258286l286.866286-41.691429 128.585143-260.022857q10.825143-23.405714 28.013714-23.405714t28.013714 23.405714l128.585143 260.022857 286.866286 41.691429q32.036571 5.12 32.036571 26.258286z"></path></svg>
                                                    {{ /loop }}
                                                </div>

                                                <div class="cms-output">
                                                    {{ content }}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        {{ /collection }}
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="references-clients__clients mt-md-0 mt-xs-50">
                    <h2 class="text--uppercase">
                        {{ titel_klanten }}
                    </h2>

                    <div class="js-clients-slider mt-md-50 mt-xs-30">
                        {{ collection from='clients' }}
                            <div class="item">
                                <img src="{{ logo }}" alt="{{ logo:alt }}">
                            </div>
                        {{ /collection }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
